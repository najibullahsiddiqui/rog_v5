<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f5f9; margin: 0; }
    .panel { max-width: 420px; margin: 80px auto; background: #fff; border: 1px solid #d9deea; border-radius: 12px; padding: 24px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { color: #44506a; margin: 0 0 18px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #bec7db; border-radius: 8px; margin-bottom: 12px; }
    button { width: 100%; background: #173b8c; color: #fff; border: none; border-radius: 8px; padding: 10px 12px; font-weight: 600; cursor: pointer; }
    .error { color: #b32020; margin-bottom: 10px; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Admin Access</h1>
    <p>Enter the configured admin token to open dashboard and admin APIs.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label for="token">Admin token</label>
      <input id="token" name="token" type="password" required />
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
